name: Test ETF Metrics

on:
  schedule:
    - cron: '0 18 * * *'   # 每天北京时间 18:00 运行（UTC 10:00）
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write   # ← 必须加，否则 GITHUB_TOKEN 无权创建/覆盖 Release

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install tushare pandas numpy
    
    - name: Run ETF metrics script
      env:
        TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      run: |
        python simple_etf_metrics.py
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: etf-metrics-report
        path: simple_etf_metrics.csv

    - name: Publish to Release
      uses: softprops/action-gh-release@v2
      with:
        files: simple_etf_metrics.csv
        tag_name: latest
        name: "Latest ETF Metrics Report"
        body: "📊 每日自动更新的ETF指标报告"
        prerelease: false
        make_latest: true
        overwrite: true 
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
